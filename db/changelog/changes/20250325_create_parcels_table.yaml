databaseChangeLog:
  - changeSet:
      id: 20250325-1
      author: vitalii
      changes:
        - createTable:
            tableName: parcels
            columns:
              - column:
                  name: tracking_number
                  type: varchar(36)
                  constraints:
                    primaryKey: true
              - column:
                  name: created_date
                  type: datetime
              - column:
                  name: arrival_date
                  type: datetime
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: enum('Sent', 'Arrived', 'Delivered')
                  constraints:
                    nullable: false
              - column:
                  name: origin
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: destination
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_updated
                  type: datetime
                  constraints:
                    nullable: false